<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Tiny Treatz | MJ Bakery</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0f0a05;
      color: #faf3e0;
      scroll-behavior: smooth;
    }

    .navbar {
      position: sticky;
      top: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2.5rem;
      background: rgba(20, 12, 8, 0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(212, 163, 115, 0.3);
      z-index: 1000;
      flex-wrap: wrap;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #e9c46a, #d4a373);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
    }

    .nav-links {
      display: flex;
      gap: 1.8rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .nav-links a {
      text-decoration: none;
      color: #f5e2c9;
      font-weight: 500;
      transition: 0.25s;
      position: relative;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 0;
      width: 0%;
      height: 2px;
      background: #e9c46a;
      transition: width 0.3s ease;
    }

    .nav-links a:hover::after {
      width: 100%;
    }

    .nav-links a:hover {
      color: #e9c46a;
    }

    .hamburger {
      display: none;
      font-size: 1.8rem;
      cursor: pointer;
      color: #e9c46a;
    }

    @media (max-width: 900px) {
      .nav-links {
        display: none;
        width: 100%;
        flex-direction: column;
        background: rgba(20, 12, 8, 0.95);
        backdrop-filter: blur(20px);
        padding: 1.5rem;
        border-radius: 24px;
        margin-top: 1rem;
      }
      .nav-links.active {
        display: flex;
      }
      .hamburger {
        display: block;
      }
      .navbar {
        padding: 1rem 1.5rem;
      }
    }

    .hero {
      text-align: center;
      padding: 4rem 2rem 6rem;
      background: radial-gradient(circle at 20% 30%, #2a1f17, #0f0a05);
      position: relative;
      overflow: hidden;
    }

    .cake-3d {
      width: 320px;
      margin: 2rem auto;
      animation: floatRotate 12s infinite ease-in-out;
      transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      filter: drop-shadow(0 20px 25px rgba(0,0,0,0.6));
      border-radius: 32px;
    }

    .cake-3d img {
      width: 100%;
      border-radius: 32px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.5);
    }

    .cake-3d:hover {
      transform: scale(1.05) rotateY(12deg);
    }

    @keyframes floatRotate {
      0% { transform: rotateY(0deg) translateY(0px); }
      50% { transform: rotateY(18deg) translateY(-12px); }
      100% { transform: rotateY(0deg) translateY(0px); }
    }

    .sprinkle {
      position: fixed;
      pointer-events: none;
      top: -20px;
      width: 6px;
      height: 16px;
      background: linear-gradient(135deg, #f4d03f, #e6b422);
      border-radius: 30%;
      opacity: 0.8;
      z-index: 999;
      animation: fall linear forwards;
    }

    @keyframes fall {
      to {
        transform: translateY(100vh) rotate(360deg);
        opacity: 0;
      }
    }

    .btn {
      background: #d4a373;
      border: none;
      padding: 10px 26px;
      border-radius: 40px;
      font-weight: 600;
      color: #1f140c;
      cursor: pointer;
      transition: 0.25s;
      font-size: 0.9rem;
    }

    .btn:hover {
      background: #e9c46a;
      box-shadow: 0 0 12px rgba(233, 196, 106, 0.6);
      transform: translateY(-2px);
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2rem;
      padding: 2rem 2rem;
    }

    .product-card {
      background: rgba(30, 22, 18, 0.7);
      backdrop-filter: blur(10px);
      border-radius: 28px;
      padding: 1.5rem;
      transition: all 0.3s ease;
      border: 1px solid rgba(212, 163, 115, 0.25);
      text-align: center;
    }

    .product-card:hover {
      transform: translateY(-12px);
      box-shadow: 0 25px 35px -12px rgba(0,0,0,0.6);
      border-color: #d4a373;
    }

    .product-img {
      width: 100%;
      height: 210px;
      object-fit: cover;
      border-radius: 20px;
      margin-bottom: 1rem;
      transition: transform 0.3s;
    }

    .product-card:hover .product-img {
      transform: scale(1.02);
    }

    .glass-card {
      background: rgba(25, 18, 13, 0.7);
      backdrop-filter: blur(12px);
      border-radius: 32px;
      padding: 2rem;
      border: 1px solid rgba(212, 163, 115, 0.4);
      max-width: 500px;
      margin: 3rem auto;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      background: #2c241e;
      border: 1px solid #6b4c3b;
      border-radius: 28px;
      color: #f5e6d3;
      margin-top: 8px;
    }

    .admin-table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(0,0,0,0.4);
      border-radius: 20px;
      overflow: hidden;
    }
    .admin-table th, .admin-table td {
      padding: 12px;
      border-bottom: 1px solid #5a3e2e;
      text-align: left;
    }

    .badge {
      background: #d4a373;
      color: #1e130c;
      padding: 4px 12px;
      border-radius: 50px;
      font-size: 0.8rem;
    }
    footer {
      text-align: center;
      padding: 2rem;
      border-top: 1px solid #2f241b;
    }
    i {
      margin-right: 6px;
    }
    h1, h2, h3 {
      font-family: 'Playfair Display', serif;
    }
  </style>
</head>
<body>

<div id="navbar-root"></div>
<main id="page-content"></main>

<script>
  // ---------- STORAGE INIT ----------
  // All prices are above ₹50, images are unique per brownie
  if (!localStorage.getItem('products')) {
    const defaultProducts = [
      { id: 101, name: "Midnight Fudge Brownie", price: 149, stock: 12, imageUrl: "https://images.pexels.com/photos/1153851/pexels-photo-1153851.jpeg?w=600&h=450&fit=crop" },
      { id: 102, name: "Caramel Swirl Crunch", price: 179, stock: 8, imageUrl: "https://images.pexels.com/photos/3182190/pexels-photo-3182190.jpeg?w=600&h=450&fit=crop" },
      { id: 103, name: "Nutella Stuffed Dream", price: 199, stock: 15, imageUrl: "https://images.pexels.com/photos/273123/pexels-photo-273123.jpeg?w=600&h=450&fit=crop" },
      { id: 104, name: "Classic Walnut Bliss", price: 129, stock: 20, imageUrl: "https://images.pexels.com/photos/45202/brownie-dessert-cake-sweet-45202.jpeg?w=600&h=450&fit=crop" }
    ];
    localStorage.setItem('products', JSON.stringify(defaultProducts));
  }
  if (!localStorage.getItem('users')) {
    localStorage.setItem('users', JSON.stringify([]));
  }
  if (!localStorage.getItem('orders')) {
    localStorage.setItem('orders', JSON.stringify([]));
  }
  if (!localStorage.getItem('carts')) {
    localStorage.setItem('carts', JSON.stringify({}));
  }

  function getCurrentUser() {
    const user = localStorage.getItem('currentUser');
    return user ? JSON.parse(user) : null;
  }

  function isAdmin() {
    const user = getCurrentUser();
    return user && user.role === 'admin';
  }

  function updateNavbar() {
    const user = getCurrentUser();
    const navbarDiv = document.getElementById('navbar-root');
    if (!navbarDiv) return;
    let navHtml = `
      <div class="navbar">
        <div class="logo"><i class="fas fa-cookie-bite"></i> MJ Bakery</div>
        <div class="hamburger" id="hamburgerIcon"><i class="fas fa-bars"></i></div>
        <div class="nav-links" id="navLinks">
          <a href="#" data-link="home">Home</a>
          <a href="#" data-link="menu">Menu</a>
          <a href="#" data-link="offers">Special Offers</a>
          <a href="#" data-link="contact">Contact Us</a>`;
    if (user) {
      if (user.role === 'admin') {
        navHtml += `<a href="#" data-link="admin">Admin Panel</a>`;
      } else {
        navHtml += `<a href="#" data-link="dashboard">Dashboard</a>`;
      }
      navHtml += `<a href="#" id="logoutBtn" style="color:#e9c46a;"><i class="fas fa-sign-out-alt"></i> Logout</a>`;
    } else {
      navHtml += `<a href="#" data-link="login">Login</a>
                  <a href="#" data-link="register">Register</a>`;
    }
    navHtml += `</div></div>`;
    navbarDiv.innerHTML = navHtml;

    const hamburger = document.getElementById('hamburgerIcon');
    const navLinks = document.getElementById('navLinks');
    if (hamburger) {
      hamburger.addEventListener('click', (e) => {
        e.stopPropagation();
        navLinks.classList.toggle('active');
      });
    }
    document.querySelectorAll('[data-link]').forEach(el => {
      el.addEventListener('click', (e) => {
        e.preventDefault();
        const page = el.getAttribute('data-link');
        if (page === 'logout') return;
        navigateTo(page);
      });
    });
    const logoutBtn = document.getElementById('logoutBtn');
    if (logoutBtn) {
      logoutBtn.addEventListener('click', (e) => {
        e.preventDefault();
        localStorage.removeItem('currentUser');
        navigateTo('home');
      });
    }
  }

  async function navigateTo(page) {
    window.history.pushState({}, '', `#${page}`);
    await renderPage(page);
  }

  async function renderPage(page) {
    const content = document.getElementById('page-content');
    if (!content) return;
    if (page === 'home') content.innerHTML = renderHome();
    else if (page === 'menu') content.innerHTML = renderMenuPage();
    else if (page === 'offers') content.innerHTML = renderOffers();
    else if (page === 'contact') content.innerHTML = renderContact();
    else if (page === 'login') content.innerHTML = renderLogin();
    else if (page === 'register') content.innerHTML = renderRegister();
    else if (page === 'dashboard') {
      const user = getCurrentUser();
      if (!user || user.role === 'admin') navigateTo('home');
      else content.innerHTML = renderUserDashboard();
    }
    else if (page === 'admin') {
      const user = getCurrentUser();
      if (!user || user.role !== 'admin') navigateTo('home');
      else content.innerHTML = renderAdminDashboard();
    }
    else content.innerHTML = renderHome();
    attachPageScripts(page);
    startSprinklesIfNeeded(page);
  }

  function renderHome() {
    return `
      <div class="hero">
        <h1 style="font-size:3.2rem;">MJ Bakery</h1>
        <h2 style="font-size:2rem; color:#e9c46a;">Tiny Treatz</h2>
        <p style="font-size:1.2rem; margin-bottom:1rem;">"Homemade happiness in every bite"</p>
        <div class="cake-3d">
          <img src="https://images.unsplash.com/photo-1606312619070-d48b4c652a52?w=600&h=400&fit=crop" alt="Decadent Chocolate Cake" style="width:100%; border-radius:32px;">
        </div>
        <button class="btn" id="exploreMenuBtn"><i class="fas fa-utensils"></i> Explore Brownies</button>
      </div>
    `;
  }

  function renderMenuPage() {
    return `
      <h2 style="text-align:center; margin-top:2rem;">🍫 Artisanal Brownies</h2>
      <div class="card-grid" id="menuGrid"></div>
    `;
  }

  function renderOffers() {
    return `
      <div style="padding:2rem;">
        <h2 style="text-align:center;">✨ Sweet Deals ✨</h2>
        <div class="card-grid">
          <div class="product-card" style="text-align:center;"><i class="fas fa-gift fa-2x"></i><h3>Buy 2 Get 1 Free</h3><p>Any brownie combo</p></div>
          <div class="product-card" style="text-align:center;"><i class="fas fa-percent fa-2x"></i><h3>20% Weekend Offer</h3><p>Code: WEEKEND20</p></div>
          <div class="product-card" style="text-align:center;"><i class="fas fa-truck fa-2x"></i><h3>Free Delivery</h3><p>Orders above ₹499</p></div>
        </div>
      </div>
    `;
  }

  function renderContact() {
    return `
      <div class="glass-card">
        <h2>Contact Us</h2>
        <p><i class="fas fa-map-marker-alt"></i> 45 Baker Street, Chocolate Valley</p>
        <p><i class="fas fa-phone"></i> +91 98765 43210</p>
        <p><i class="fas fa-envelope"></i> hello@tinytreatz.com</p>
        <hr style="margin:20px 0; border-color:#d4a373;">
        <input type="text" id="contactName" placeholder="Your Name"><br><br>
        <textarea id="contactMsg" rows="3" placeholder="Your message..."></textarea><br>
        <button class="btn" id="sendContactBtn">Send Message</button>
      </div>
    `;
  }

  function renderLogin() {
    return `<div class="glass-card"><h2>Login</h2><input id="loginEmail" placeholder="Email"><br><br><input id="loginPassword" type="password" placeholder="Password"><br><br><button class="btn" id="doLoginBtn">Sign In</button><p style="margin-top:1rem;">New? <a href="#" id="toRegisterLink">Create account</a></p></div>`;
  }

  function renderRegister() {
    return `<div class="glass-card"><h2>Register</h2><input id="regName" placeholder="Full Name"><br><br><input id="regEmail" placeholder="Email"><br><br><input id="regPassword" type="password" placeholder="Password"><br><br><button class="btn" id="doRegBtn">Join as Customer</button><p style="margin-top:1rem;">Existing? <a href="#" id="toLoginLink">Login</a></p></div>`;
  }

  function renderUserDashboard() {
    const user = getCurrentUser();
    const userId = user?.email;
    const cartData = JSON.parse(localStorage.getItem('carts')) || {};
    const userCart = cartData[userId] || [];
    const orders = JSON.parse(localStorage.getItem('orders')).filter(o => o.userEmail === userId);
    return `
      <div style="padding:2rem;">
        <h2>🍪 Welcome, ${user?.name || 'Customer'}!</h2>
        <div style="display:flex; flex-wrap:wrap; gap:2rem;">
          <div style="flex:2; min-width:280px; background:#1e1610; border-radius:28px; padding:1.5rem;">
            <h3>🛒 Your Cart</h3>
            <div id="cartItemsList"></div>
            <div id="cartTotal" style="font-weight:bold; margin:1rem 0;"></div>
            <button class="btn" id="placeOrderBtn">Place Order</button>
          </div>
          <div style="flex:3; background:#1e1610; border-radius:28px; padding:1.5rem;">
            <h3>📦 Order History</h3>
            <div id="orderHistoryList"></div>
          </div>
        </div>
      </div>
    `;
  }

  function renderAdminDashboard() {
    return `
      <div style="padding:1.5rem;">
        <h2>🍩 Admin Control</h2>
        <div style="display:flex; flex-wrap:wrap; gap:2rem;">
          <div style="flex:1; background:#1e1610; border-radius:28px; padding:1rem;">
            <h3>➕ Add Product</h3>
            <input id="prodName" placeholder="Name"><br><br>
            <input id="prodPrice" placeholder="Price (min ₹51)"><br><br>
            <input id="prodStock" placeholder="Stock"><br><br>
            <input id="prodImage" placeholder="Image URL (HD)"><br><br>
            <button class="btn" id="adminAddProductBtn">Add Product</button>
          </div>
          <div style="flex:3;">
            <h3>📦 Manage Products</h3>
            <div id="adminProductsList"></div>
            <hr><h3>📋 All Orders</h3>
            <div id="adminOrdersList"></div>
            <hr><h3>👥 Registered Customers</h3>
            <div id="adminUsersList"></div>
          </div>
        </div>
      </div>
    `;
  }

  function attachPageScripts(page) {
    if (page === 'home') {
      const exploreBtn = document.getElementById('exploreMenuBtn');
      if (exploreBtn) exploreBtn.addEventListener('click', () => navigateTo('menu'));
    }
    if (page === 'menu') {
      renderMenuGrid();
    }
    if (page === 'login') {
      document.getElementById('doLoginBtn')?.addEventListener('click', () => {
        const email = document.getElementById('loginEmail').value;
        const pwd = document.getElementById('loginPassword').value;
        if (email === 'admin@mj.com' && pwd === 'admin123') {
          localStorage.setItem('currentUser', JSON.stringify({ email: 'admin@mj.com', name: 'Admin', role: 'admin' }));
          navigateTo('admin');
          return;
        }
        const users = JSON.parse(localStorage.getItem('users'));
        const found = users.find(u => u.email === email && u.password === pwd);
        if (found) {
          localStorage.setItem('currentUser', JSON.stringify({ ...found, role: 'customer' }));
          navigateTo('dashboard');
        } else alert('Invalid credentials');
      });
      document.getElementById('toRegisterLink')?.addEventListener('click', (e) => { e.preventDefault(); navigateTo('register'); });
    }
    if (page === 'register') {
      document.getElementById('doRegBtn')?.addEventListener('click', () => {
        const name = document.getElementById('regName').value;
        const email = document.getElementById('regEmail').value;
        const pwd = document.getElementById('regPassword').value;
        if (!name || !email || !pwd) return alert('Fill all fields');
        const users = JSON.parse(localStorage.getItem('users'));
        if (users.find(u => u.email === email)) return alert('Email exists');
        users.push({ name, email, password: pwd, role: 'customer' });
        localStorage.setItem('users', JSON.stringify(users));
        alert('Registered! Please login');
        navigateTo('login');
      });
      document.getElementById('toLoginLink')?.addEventListener('click', (e) => { e.preventDefault(); navigateTo('login'); });
    }
    if (page === 'dashboard') {
      renderCartAndHistory();
      document.getElementById('placeOrderBtn')?.addEventListener('click', placeOrderFromCart);
    }
    if (page === 'admin') {
      renderAdminProductsList();
      renderAdminOrdersList();
      renderAdminUsersList();
      document.getElementById('adminAddProductBtn')?.addEventListener('click', () => {
        const name = document.getElementById('prodName').value;
        const price = parseInt(document.getElementById('prodPrice').value);
        const stock = parseInt(document.getElementById('prodStock').value);
        let img = document.getElementById('prodImage').value;
        if (!name || isNaN(price) || price < 51) return alert('Price must be above ₹50');
        if (!img) img = "https://images.pexels.com/photos/45202/brownie-dessert-cake-sweet-45202.jpeg?w=600&h=450&fit=crop";
        const products = JSON.parse(localStorage.getItem('products'));
        const newId = Date.now();
        products.push({ id: newId, name, price, stock, imageUrl: img });
        localStorage.setItem('products', JSON.stringify(products));
        renderAdminProductsList();
      });
    }
    if (page === 'contact') {
      document.getElementById('sendContactBtn')?.addEventListener('click', () => {
        alert('✨ Thanks! We’ll get back soon.');
      });
    }
  }

  function renderMenuGrid() {
    const products = JSON.parse(localStorage.getItem('products'));
    const container = document.getElementById('menuGrid');
    if (!container) return;
    container.innerHTML = products.map(p => `
      <div class="product-card">
        <img class="product-img" src="${p.imageUrl}" onerror="this.src='https://images.pexels.com/photos/45202/brownie-dessert-cake-sweet-45202.jpeg?w=600&h=450&fit=crop'">
        <h3>${p.name}</h3>
        <p>₹${p.price} | 🍫 Stock: ${p.stock}</p>
        <button class="btn addCartBtn" data-id="${p.id}">Add to Cart</button>
      </div>
    `).join('');
    document.querySelectorAll('.addCartBtn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const user = getCurrentUser();
        if (!user || user.role === 'admin') {
          alert('Please login as a customer to add to cart');
          navigateTo('login');
          return;
        }
        const productId = parseInt(btn.dataset.id);
        const carts = JSON.parse(localStorage.getItem('carts')) || {};
        const userCart = carts[user.email] || [];
        const existing = userCart.find(i => i.productId === productId);
        if (existing) existing.quantity += 1;
        else userCart.push({ productId, quantity: 1 });
        carts[user.email] = userCart;
        localStorage.setItem('carts', JSON.stringify(carts));
        alert('✨ Added to cart!');
      });
    });
  }

  function renderCartAndHistory() {
    const user = getCurrentUser();
    if (!user) return;
    const carts = JSON.parse(localStorage.getItem('carts')) || {};
    const userCart = carts[user.email] || [];
    const products = JSON.parse(localStorage.getItem('products'));
    const cartItemsDiv = document.getElementById('cartItemsList');
    const cartTotalSpan = document.getElementById('cartTotal');
    if (!cartItemsDiv) return;
    if (userCart.length === 0) {
      cartItemsDiv.innerHTML = '<p>Cart is empty 🧁</p>';
      cartTotalSpan.innerText = 'Total: ₹0';
      return;
    }
    let cartHtml = '<div>';
    let total = 0;
    userCart.forEach((item, idx) => {
      const prod = products.find(p => p.id === item.productId);
      if (prod) {
        const subtotal = prod.price * item.quantity;
        total += subtotal;
        cartHtml += `<div style="display:flex; justify-content:space-between; border-bottom:1px solid #d4a373; margin-bottom:10px;">
          <span>${prod.name} x ${item.quantity}</span>
          <span>₹${subtotal}</span>
          <span><button class="btnInc" data-idx="${idx}" style="background:#5e3a2e; padding:2px 8px;">+</button>
          <button class="btnDec" data-idx="${idx}" style="background:#5e3a2e; padding:2px 8px;">-</button>
          <button class="btnRemove" data-idx="${idx}" style="background:#aa2e2e;">🗑️</button></span>
        </div>`;
      }
    });
    cartHtml += '</div>';
    cartItemsDiv.innerHTML = cartHtml;
    cartTotalSpan.innerText = `Total: ₹${total}`;
    document.querySelectorAll('.btnInc').forEach(btn => {
      btn.addEventListener('click', () => { adjustQuantity(parseInt(btn.dataset.idx), 1); });
    });
    document.querySelectorAll('.btnDec').forEach(btn => {
      btn.addEventListener('click', () => { adjustQuantity(parseInt(btn.dataset.idx), -1); });
    });
    document.querySelectorAll('.btnRemove').forEach(btn => {
      btn.addEventListener('click', () => { adjustQuantity(parseInt(btn.dataset.idx), 0, true); });
    });
    renderOrderHistory();
  }

  function adjustQuantity(idx, delta, remove = false) {
    const user = getCurrentUser();
    const carts = JSON.parse(localStorage.getItem('carts')) || {};
    let userCart = carts[user.email] || [];
    if (remove || (userCart[idx] && userCart[idx].quantity + delta <= 0)) {
      userCart.splice(idx, 1);
    } else {
      userCart[idx].quantity += delta;
    }
    carts[user.email] = userCart;
    localStorage.setItem('carts', JSON.stringify(carts));
    renderCartAndHistory();
  }

  function placeOrderFromCart() {
    const user = getCurrentUser();
    const carts = JSON.parse(localStorage.getItem('carts')) || {};
    let userCart = carts[user.email] || [];
    if (userCart.length === 0) return alert('Cart empty');
    const products = JSON.parse(localStorage.getItem('products'));
    let insufficient = false;
    for (let item of userCart) {
      const prod = products.find(p => p.id === item.productId);
      if (!prod || prod.stock < item.quantity) {
        alert(`Insufficient stock for ${prod?.name}`);
        insufficient = true;
        break;
      }
    }
    if (insufficient) return;
    let totalAmount = 0;
    const orderItems = [];
    for (let item of userCart) {
      const prod = products.find(p => p.id === item.productId);
      totalAmount += prod.price * item.quantity;
      orderItems.push({ id: prod.id, name: prod.name, quantity: item.quantity, price: prod.price });
      prod.stock -= item.quantity;
    }
    localStorage.setItem('products', JSON.stringify(products));
    const orders = JSON.parse(localStorage.getItem('orders'));
    const newOrder = {
      id: Date.now(),
      userEmail: user.email,
      items: orderItems,
      total: totalAmount,
      status: 'Pending',
      date: new Date().toLocaleString()
    };
    orders.push(newOrder);
    localStorage.setItem('orders', JSON.stringify(orders));
    carts[user.email] = [];
    localStorage.setItem('carts', JSON.stringify(carts));
    alert('Order placed! Status: Pending');
    renderCartAndHistory();
  }

  function renderOrderHistory() {
    const user = getCurrentUser();
    const orders = JSON.parse(localStorage.getItem('orders')).filter(o => o.userEmail === user.email);
    const container = document.getElementById('orderHistoryList');
    if (!container) return;
    if (orders.length === 0) { container.innerHTML = '<p>No past orders</p>'; return; }
    container.innerHTML = orders.map(o => `<div style="background:#2e231b; border-radius:16px; margin-bottom:12px; padding:12px;"><b>Order #${o.id}</b> | ₹${o.total} | Status: <span class="badge">${o.status}</span><br>${o.items.map(i=>`${i.name} x${i.quantity}`).join(', ')}<br><small>${o.date}</small></div>`).join('');
  }

  function renderAdminProductsList() {
    const products = JSON.parse(localStorage.getItem('products'));
    const container = document.getElementById('adminProductsList');
    if (!container) return;
    container.innerHTML = `<table class="admin-table"><tr><th>Name</th><th>Price</th><th>Stock</th><th>Image</th><th>Actions</th></tr>${products.map(p => `<tr><td>${p.name}</td><td>₹${p.price}</td><td>${p.stock}</td><td><img src="${p.imageUrl}" width="50" height="50" style="border-radius:12px; object-fit:cover;"></td><td><button class="editProdBtn" data-id="${p.id}">✏️</button> <button class="delProdBtn" data-id="${p.id}">🗑️</button></td></tr>`).join('')}</table>`;
    document.querySelectorAll('.editProdBtn').forEach(btn => {
      btn.addEventListener('click', () => editProduct(parseInt(btn.dataset.id)));
    });
    document.querySelectorAll('.delProdBtn').forEach(btn => {
      btn.addEventListener('click', () => deleteProduct(parseInt(btn.dataset.id)));
    });
  }

  function editProduct(id) {
    const newPrice = prompt('New price (must be >50)');
    const newStock = prompt('New stock');
    if (newPrice && newStock && parseInt(newPrice) > 50) {
      let products = JSON.parse(localStorage.getItem('products'));
      const prod = products.find(p => p.id === id);
      if (prod) { prod.price = parseInt(newPrice); prod.stock = parseInt(newStock); }
      localStorage.setItem('products', JSON.stringify(products));
      renderAdminProductsList();
      renderAdminOrdersList();
    } else if (newPrice && parseInt(newPrice) <= 50) alert('Price must be above ₹50');
  }

  function deleteProduct(id) {
    let products = JSON.parse(localStorage.getItem('products'));
    products = products.filter(p => p.id !== id);
    localStorage.setItem('products', JSON.stringify(products));
    renderAdminProductsList();
  }

  function renderAdminOrdersList() {
    const orders = JSON.parse(localStorage.getItem('orders'));
    const container = document.getElementById('adminOrdersList');
    if (!container) return;
    container.innerHTML = `<table class="admin-table"><tr><th>ID</th><th>User</th><th>Items</th><th>Total</th><th>Status</th><th>Action</th></tr>${orders.map(o => `<tr><td>${o.id}</td><td>${o.userEmail}</td><td>${o.items.map(i=>i.name).join(', ')}</td><td>₹${o.total}</td><td><select class="statusSelect" data-id="${o.id}"><option ${o.status==='Pending'?'selected':''}>Pending</option><option ${o.status==='Accepted'?'selected':''}>Accepted</option><option ${o.status==='Rejected'?'selected':''}>Rejected</option></select></td><td><button class="updateStatusBtn" data-id="${o.id}">Update</button></td></tr>`).join('')}</table>`;
    document.querySelectorAll('.updateStatusBtn').forEach(btn => {
      btn.addEventListener('click', () => {
        const orderId = parseInt(btn.dataset.id);
        const select = document.querySelector(`.statusSelect[data-id="${orderId}"]`);
        const newStatus = select.value;
        let ordersArr = JSON.parse(localStorage.getItem('orders'));
        const order = ordersArr.find(o => o.id === orderId);
        if (order) order.status = newStatus;
        localStorage.setItem('orders', JSON.stringify(ordersArr));
        renderAdminOrdersList();
      });
    });
  }

  function renderAdminUsersList() {
    const users = JSON.parse(localStorage.getItem('users'));
    const container = document.getElementById('adminUsersList');
    if (!container) return;
    container.innerHTML = `<table class="admin-table"><tr><th>Name</th><th>Email</th><th>Role</th></tr>${users.map(u => `<tr><td>${u.name}</td><td>${u.email}</td><td>${u.role}</td></tr>`).join('')}</table>`;
  }

  function startSprinklesIfNeeded(page) {
    if (page !== 'home') return;
    for (let i = 0; i < 40; i++) {
      const sprinkle = document.createElement('div');
      sprinkle.classList.add('sprinkle');
      sprinkle.style.left = Math.random() * 100 + '%';
      sprinkle.style.animationDuration = Math.random() * 2 + 1.5 + 's';
      sprinkle.style.width = Math.random() * 5 + 3 + 'px';
      sprinkle.style.height = Math.random() * 12 + 8 + 'px';
      document.body.appendChild(sprinkle);
      setTimeout(() => sprinkle.remove(), 4000);
    }
    setInterval(() => {
      if (page === 'home' && document.querySelector('.hero')) {
        const s = document.createElement('div');
        s.classList.add('sprinkle');
        s.style.left = Math.random() * 100 + '%';
        s.style.animationDuration = Math.random() * 2 + 1.5 + 's';
        document.body.appendChild(s);
        setTimeout(() => s.remove(), 4000);
      }
    }, 600);
  }

  function router() {
    const hash = window.location.hash.slice(1) || 'home';
    updateNavbar();
    renderPage(hash);
  }
  window.addEventListener('popstate', router);
  router();
</script>
<footer style="text-align:center; padding:1rem;">🍰 Tiny Treatz — Homemade happiness in every bite</footer>
</body>
